[workspace]
name = "fasthep"
channels = ["conda-forge"]
platforms = ["linux-64"]

[dependencies]
python = ">=3.11"
pip = "*"
pytest = "*"
ruff = "*"
python-build = "*"
twine = "*"

[pypi-dependencies]
fasthep = { path = ".", editable = true }

[environments]
py311 = ["py311"]
py313 = ["py313"]
py314 = ["py314"]

[feature.py311.dependencies]
python = "3.11.*"

[feature.py313.dependencies]
python = "3.13.*"

[feature.py314.dependencies]
python = "3.14.*"

[tasks]
format = "ruff format src tests"
lint = "ruff check src tests"
lint-fix = "ruff check --fix src tests"
test = "pytest"
build = "python -m build"
check-dist = "twine check dist/*"
smoke = "python -c 'import fasthep; print(fasthep.__version__)'"

[tasks.check]
depends-on = ["lint", "test", "smoke"]

[tasks.ci]
depends-on = ["check", "build", "check-dist"]
